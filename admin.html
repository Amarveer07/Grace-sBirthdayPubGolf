<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pub Golf Ref</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="loginScreen" class="login-screen">
    <div class="login-card">
      <h1>👨‍⚖️ Ref Login</h1>
      <p>Enter the referee password.</p>

      <input id="passwordInput" type="password" placeholder="Password" />
      <button id="loginButton">Enter</button>

      <p id="loginError" class="login-error">Incorrect password.</p>
    </div>
  </div>

  <main class="app hidden" id="adminContent">
    <header class="hero">
      <p class="kicker">Referee Mode</p>
      <h1>👨‍⚖️ Pub Golf Admin</h1>
      <p class="tagline">Update scores live</p>
    </header>

    <section class="hole-panel">
      <p class="label">Current Hole</p>
      <h2 id="adminHoleTitle">Hole 1 of 9</h2>

      <label class="admin-label">
        Pub name
        <input id="adminPubName" type="text" />
      </label>

      <button id="savePubName" class="admin-main-button">Save Pub Name</button>

      <div class="admin-hole-buttons">
        <button id="previousHole">Previous Hole</button>
        <button id="nextHole">Next Hole</button>
      </div>
    </section>

    <section class="board-top">
      <h2>Teams</h2>
      <button id="resetScores" class="danger-button">Reset Scores</button>
    </section>

    <section id="adminTeams" class="admin-teams">
      <p class="loading">Loading teams...</p>
    </section>
  </main>

  <script>
    const PASSWORD = "pubgolf";

    const loginScreen = document.getElementById("loginScreen");
    const adminContent = document.getElementById("adminContent");
    const loginButton = document.getElementById("loginButton");
    const passwordInput = document.getElementById("passwordInput");
    const loginError = document.getElementById("loginError");

    function login() {
      if (passwordInput.value === PASSWORD) {
        loginScreen.classList.add("hidden");
        adminContent.classList.remove("hidden");

        const script = document.createElement("script");
        script.type = "module";
        script.src = "admin.js";
        document.body.appendChild(script);
      } else {
        loginError.style.display = "block";
      }
    }

    loginButton.addEventListener("click", login);

    passwordInput.addEventListener("keydown", function (event) {
      if (event.key === "Enter") {
        login();
      }
    });
  </script>
</body>
</html>
