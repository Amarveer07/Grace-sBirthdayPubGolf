<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pub Golf Live</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="hero">
      <p class="kicker">Birthday Edition</p>
      <h1>🍺 Pub Golf Live</h1>
      <p class="tagline">Lowest score wins</p>
    </header>

    <section class="hole-panel">
      <p class="label">Current hole</p>
      <h2 id="holeTitle">Hole 1 of 9</h2>
      <p id="pubName" class="pub-name">Pub 1</p>

      <div class="progress-shell">
        <div id="progressBar" class="progress-bar"></div>
      </div>
    </section>

    <section class="board-top">
      <h2>Leaderboard</h2>
      <p id="lastUpdated">Live updates</p>
    </section>

    <section id="leaderboard" class="leaderboard">
      <p class="loading">Loading scores...</p>
    </section>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
