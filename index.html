<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pub Golf Live</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="hero festive-hero">
      <div class="party-strip">🎉 🍻 🎂 🏌️‍♂️ 🍺 🎊</div>

      <p class="kicker">Birthday Pub Golf</p>
     <h1>
  🍺 Pub Golf Live
  <span
    id="easterEggTrophy"
    class="easter-egg-trophy"
    role="button"
    tabindex="0"
    aria-label="Trophy"
  >
    🏆
  </span>
</h1>
      <p class="tagline">Lowest score wins</p>

      <div class="hero-badges">
        <span>9 Holes</span>
        <span>5 Teams</span>
        <span>Live Scores</span>
      </div>
    </header>

    <section class="hole-panel">
      <p class="label">Current hole</p>
      <h2 id="holeTitle">Hole 1 of 9</h2>
      <p id="pubName" class="pub-name">Pub 1</p>

      <div class="progress-shell">
        <div id="progressBar" class="progress-bar"></div>
      </div>
    </section>

    <section class="board-top">
      <h2>Leaderboard</h2>
      <p id="lastUpdated">Live updates</p>
    </section>

    <section id="leaderboard" class="leaderboard"></section>
<section class="activity-panel">
  <div class="activity-header">
    <h2>🍻 Recent Activity</h2>
    <span class="activity-live">● LIVE</span>
  </div>

  <div id="publicActivity" class="public-activity">
    <p class="activity-empty">No recent activity yet.</p>
  </div>
</section>
    <div class="public-page-links">
  <a class="teams-link" href="teams.html">📸 View Teams</a>
  <a class="teams-link" href="podium.html">🏆 View Podium</a>
</div>

<a class="ref-link" href="admin.html">Ref Login</a>
  </main>
<div
  id="birthdayEasterEgg"
  class="birthday-easter-egg"
  aria-hidden="true"
>
  <div class="birthday-message">
    🎂 HAPPY BIRTHDAY GRACE!! 🎂
  </div>
</div>
  <script type="module" src="app.js"></script>
</body>
</html>
